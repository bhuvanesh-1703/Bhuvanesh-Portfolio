<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    .letter-b {
      fill: none;
      stroke: #0F172A;
    }
    @media (prefers-color-scheme: dark) {
      .letter-b {
        stroke: #FFFFFF;
      }
    }
  </style>
  
  <!-- Left Chevron (<) - Electric Blue -->
  <path d="M 190 170 L 110 256 L 190 342" 
        fill="none" 
        stroke="#3B82F6" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Letter B (Stem + Stacked Chevrons) -->
  <!-- Stem -->
  <path class="letter-b" d="M 250 130 L 250 382" 
        stroke-width="32" 
        stroke-linecap="round" />
        
  <!-- Top Chevron -->
  <path class="letter-b" d="M 250 130 L 350 193 L 250 256" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Bottom Chevron -->
  <path class="letter-b" d="M 250 256 L 370 319 L 250 382" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>